# Run tests in GitHub Actions
#
# NOTE: Pin actions to a specific commit to avoid having the authentication
# token stolen if the Action is compromised. See the comments and links here:
# https://github.com/pypa/gh-action-pypi-publish/issues/27
#
name: test

# Only build PRs, the main branch, and releases. Pushes to branches will only
# be built when a PR is opened. This avoids duplicated buids in PRs comming
# from branches in the origin repository (1 for PR and 1 for push).
on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions: {}

jobs:
  #############################################################################
  # Run tests
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      # Cancel any previous run of the test job
      # We pin the commit hash corresponding to v0.5.0, and not pinning the tag
      # because we are giving full access through the github.token.
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@85880fa0301c86cca9da44039ee3bb12d3bedbfa
        with:
          access_token: ${{ github.token }}

      # Checks-out your repository under $GITHUB_WORKSPACE
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # The GitHub token is preserved by default but this job doesn't need
          # to be able to push to GitHub.
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install requirements
        run: python -m pip install --requirement requirements-dev.txt

      - name: Install the package
        run: python -m pip install --no-deps --editable .

      - name: List installed packages
        run: python -m pip freeze

      - name: Run the tests
        run: make test

      - name: Upload coverage as artifact
        uses: actions/upload-artifact@v7
        with:
          path: .coverage
          name: coverage
          if-no-files-found: ignore
          include-hidden-files: true


  #############################################################################
  # Check coverage and upload a report
  #
  # Inspired by: https://hynek.me/articles/ditch-codecov-python/
  coverage:
    name: upload coverage report
    if: always()
    needs: test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # The GitHub token is preserved by default but this job doesn't need
          # to be able to push to GitHub.
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          # Use latest Python, so it understands all syntax.
          python-version: "3.14"

      - name: Get the pip cache folder
        id: pip-cache
        run: echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Setup caching for pip packages
        uses: actions/cache@v5
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-coverage

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage
          # If true, the downloaded artifacts will be in the same directory
          # specified by path.
          merge-multiple: true

      - name: Install coverage.py
        run: python -m pip install --upgrade coverage[toml]

      - name: Make an HTML report
        run: |
          python -m coverage html --skip-empty

      - name: Report coverage on the job summary
        run: python -m coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        with:
          name: html-report
          path: htmlcov
